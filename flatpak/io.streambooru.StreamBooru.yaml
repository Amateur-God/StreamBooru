# Legacy manual manifest — CI uses electron-builder --linux flatpak instead.
# See electron-builder.yml (flatpak:) and .github/workflows/release.yml (flatpak job).
#
# Local build (requires flatpak + flathub SDK/base apps installed):
#   npm ci
#   npx electron-builder --linux flatpak --config electron-builder.yml

app-id: io.streambooru.StreamBooru
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk

command: streambooru

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-download

modules: []

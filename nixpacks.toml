# StreamBooru sync server — Coolify / Nixpacks (Bun runtime)
# Coolify "Base Directory": / (repository root)

[phases.setup]
nixPkgs = ['curl', 'unzip']
aptPkgs = ['build-essential']
cmds = [
    "curl -fsSL https://bun.sh/install | bash",
    "cp /root/.bun/bin/bun /usr/bin/bun",
    "chmod +x /usr/bin/bun"
]

[phases.install]
cmds = ['cd server && bun install --ignore-scripts']

[phases.build]
cmds = ['rm -rf server/webapp && cp -r renderer server/webapp']

[start]
cmd = 'cd server && bun run start:prod'

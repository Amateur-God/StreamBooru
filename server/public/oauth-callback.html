<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamBooru — Signing in…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1115;
      color: #e6e6e6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Signing in…</p>
  <script>
  (function () {
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const linked = params.get('linked');
    const origin = location.origin.replace(/\/+$/, '');
    const KEY = 'sb_account_v1';

    if (token) {
      let acc = {};
      try { acc = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch {}
      acc.token = token;
      if (!acc.serverBase) acc.serverBase = origin;
      localStorage.setItem(KEY, JSON.stringify(acc));
      location.replace('/app/');
      return;
    }

    if (linked) {
      location.replace('/app/?linked=1');
      return;
    }

    location.replace('/app/');
  })();
  </script>
</body>
</html>

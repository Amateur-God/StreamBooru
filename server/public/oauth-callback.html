<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamBooru — Signing in…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1115;
      color: #e6e6e6;
      font-family: system-ui, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .box { max-width: 420px; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p { color: #a9b0c0; margin: 0 0 16px; }
    a {
      color: #6aa2ff;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <h1 id="title">Signing in…</h1>
    <p id="msg">Completing Discord login.</p>
    <p id="fallback" hidden><a href="/app/">Return to StreamBooru</a></p>
  </div>
  <script>
  (function () {
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const linked = params.get('linked');
    const error = params.get('error');
    const origin = location.origin.replace(/\/+$/, '');
    const KEY = 'sb_account_v1';
    const title = document.getElementById('title');
    const msg = document.getElementById('msg');
    const fallback = document.getElementById('fallback');

    function showDone(text) {
      title.textContent = 'Done';
      msg.textContent = text;
      fallback.hidden = false;
    }

    if (error) {
      title.textContent = 'Sign-in failed';
      msg.textContent = error;
      fallback.hidden = false;
      return;
    }

    const payload = {
      type: 'streambooru_oauth',
      token: token || null,
      linked: linked === '1' || linked === 'true'
    };

    function saveAccount(acc) {
      localStorage.setItem(KEY, JSON.stringify(acc));
    }

    async function persistLoginAndRedirect() {
      let acc = {};
      try { acc = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch {}
      acc.token = token;
      if (!acc.serverBase) acc.serverBase = origin;

      try {
        const meRes = await fetch(origin + '/api/me', {
          headers: { Authorization: 'Bearer ' + token, Accept: 'application/json' }
        });
        if (meRes.ok) {
          const me = await meRes.json();
          if (me?.ok && me.user) acc.user = me.user;
        }
      } catch (e) {
        console.warn('Could not fetch account profile', e);
      }

      saveAccount(acc);
      location.replace('/app/');
    }

    // Popup flow: notify opener and close (keeps /app/ tab in front)
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage(payload, origin);
        showDone('Signed in! This window should close automatically.');
        setTimeout(function () { window.close(); }, 400);
        setTimeout(function () { location.replace('/app/'); }, 2000);
        return;
      } catch (e) {
        console.warn('postMessage failed', e);
      }
    }

    // Full-page redirect fallback (mobile / popup blocked)
    if (token) {
      persistLoginAndRedirect();
      return;
    }

    if (linked) {
      location.replace('/app/?linked=1');
      return;
    }

    location.replace('/app/');
  })();
  </script>
</body>
</html>
